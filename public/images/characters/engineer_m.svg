<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220">
  <!-- Dark T-shirt body -->
  <path d="M0,220 L0,156 C30,145 60,138 70,130 L90,130 C100,138 130,145 160,156 L160,220 Z" fill="#3D3D3D"/>
  <!-- T-shirt crew neck -->
  <path d="M68,130 Q80,142 92,130 Q86,134 80,134 Q74,134 68,130 Z" fill="#2D2D2D"/>
  <!-- Company logo area on chest (stylized "AI") -->
  <text x="65" y="170" font-family="monospace" font-size="18" font-weight="bold" fill="#A0A0A0" letter-spacing="2">AI</text>
  <!-- Neck -->
  <rect x="71" y="126" width="18" height="17" rx="3" fill="#FFCBA4"/>
  <!-- Head -->
  <ellipse cx="80" cy="85" rx="38" ry="44" fill="#FFCBA4"/>
  <!-- Ears -->
  <ellipse cx="42" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <ellipse cx="118" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <!-- Dark hair, short, casual -->
  <path d="M44,80 C44,50 52,39 80,38 C108,39 116,50 116,80 C110,58 50,58 44,80 Z" fill="#1C1C1C"/>
  <ellipse cx="44" cy="83" rx="6" ry="8" fill="#1C1C1C"/>
  <ellipse cx="116" cy="83" rx="6" ry="8" fill="#1C1C1C"/>
  <!-- Slight stubble (subtle) -->
  <path d="M58,112 Q80,120 102,112" stroke="#8B7355" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="1.5,2"/>
  <!-- Eyebrows (dark, slightly thick) -->
  <path d="M54,73 Q65,68 74,71" stroke="#1C1C1C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M86,71 Q95,68 106,73" stroke="#1C1C1C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="65" cy="83" rx="8" ry="5" fill="white"/>
  <ellipse cx="95" cy="83" rx="8" ry="5" fill="white"/>
  <circle cx="65" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="95" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="66.5" cy="82.5" r="1.5" fill="white"/>
  <circle cx="96.5" cy="82.5" r="1.5" fill="white"/>
  <!-- Nose -->
  <path d="M77,96 Q80,102 83,96" stroke="#D4A080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Relaxed, slightly confident expression -->
  <path d="M70,108 Q80,115 90,108" stroke="#A05050" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
