<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220">
  <!-- Dark T-shirt body -->
  <path d="M0,220 L0,156 C30,145 60,138 70,130 L90,130 C100,138 130,145 160,156 L160,220 Z" fill="#3D3D3D"/>
  <!-- T-shirt crew neck -->
  <path d="M68,130 Q80,142 92,130 Q86,134 80,134 Q74,134 68,130 Z" fill="#2D2D2D"/>
  <!-- Company logo area -->
  <text x="65" y="170" font-family="monospace" font-size="18" font-weight="bold" fill="#A0A0A0" letter-spacing="2">AI</text>
  <!-- Neck -->
  <rect x="71" y="126" width="18" height="17" rx="3" fill="#FFCBA4"/>
  <!-- Head -->
  <ellipse cx="80" cy="85" rx="38" ry="44" fill="#FFCBA4"/>
  <!-- Ears -->
  <ellipse cx="42" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <ellipse cx="118" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <!-- Small stud earrings -->
  <circle cx="38" cy="90" r="2.5" fill="#888"/>
  <circle cx="122" cy="90" r="2.5" fill="#888"/>
  <!-- Dark hair, tied back in a high bun -->
  <!-- Main hair top -->
  <path d="M44,82 C44,50 52,39 80,38 C108,39 116,50 116,82 C110,60 50,60 44,82 Z" fill="#1C1C1C"/>
  <ellipse cx="44" cy="85" rx="6" ry="8" fill="#1C1C1C"/>
  <ellipse cx="116" cy="85" rx="6" ry="8" fill="#1C1C1C"/>
  <!-- Bun on top of head -->
  <ellipse cx="80" cy="40" rx="14" ry="10" fill="#1C1C1C"/>
  <ellipse cx="80" cy="38" rx="10" ry="7" fill="#282828"/>
  <!-- Hair tie -->
  <ellipse cx="80" cy="49" rx="7" ry="3" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Eyebrows (dark) -->
  <path d="M54,74 Q65,70 74,72" stroke="#1C1C1C" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <path d="M86,72 Q95,70 106,74" stroke="#1C1C1C" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- Lashes -->
  <path d="M57,79 L57,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M61,77 L60,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M65,76 L65,72" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M69,77 L70,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M73,79 L74,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M87,79 L87,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M91,77 L90,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M95,76 L95,72" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M99,77 L100,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M103,79 L104,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="65" cy="83" rx="8" ry="5" fill="white"/>
  <ellipse cx="95" cy="83" rx="8" ry="5" fill="white"/>
  <circle cx="65" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="95" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="66.5" cy="82.5" r="1.5" fill="white"/>
  <circle cx="96.5" cy="82.5" r="1.5" fill="white"/>
  <!-- Subtle blush -->
  <ellipse cx="52" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.28"/>
  <ellipse cx="108" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.28"/>
  <!-- Nose -->
  <path d="M77,96 Q80,101 83,96" stroke="#D4A080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Confident smile -->
  <path d="M69,108 Q80,116 91,108" stroke="#B07070" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M73,108 Q80,112 87,108" fill="#E0A0A0" opacity="0.35" stroke="none"/>
</svg>
