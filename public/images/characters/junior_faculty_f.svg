<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220">
  <!-- Blouse body (rose/cream) -->
  <path d="M0,220 L0,156 C30,145 60,138 70,130 L90,130 C100,138 130,145 160,156 L160,220 Z" fill="#C8849A"/>
  <!-- Blouse collar / neckline (softer V) -->
  <path d="M70,130 L76,150 L80,154 L84,150 L90,130 Q84,138 80,138 Q76,138 70,130 Z" fill="#B0708A"/>
  <!-- Small bow/knot at collar -->
  <ellipse cx="80" cy="145" rx="7" ry="4" fill="#E0A0B8"/>
  <circle cx="80" cy="145" r="3" fill="#C8849A"/>
  <!-- Neck -->
  <rect x="71" y="126" width="18" height="17" rx="3" fill="#FFCBA4"/>
  <!-- Head -->
  <ellipse cx="80" cy="85" rx="38" ry="44" fill="#FFCBA4"/>
  <!-- Ears -->
  <ellipse cx="42" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <ellipse cx="118" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <!-- Small earrings -->
  <circle cx="38" cy="90" r="3" fill="#E0B0C0"/>
  <circle cx="122" cy="90" r="3" fill="#E0B0C0"/>
  <!-- Black hair, medium length (shoulder length) -->
  <path d="M44,80 C44,48 52,38 80,37 C108,38 116,48 116,80 C110,56 50,56 44,80 Z" fill="#1C1C1C"/>
  <!-- Side hair flowing down -->
  <path d="M42,82 C38,94 36,110 38,124 C40,132 46,136 52,133 L52,80 C48,78 44,78 42,82 Z" fill="#1C1C1C"/>
  <path d="M118,82 C122,94 124,110 122,124 C120,132 114,136 108,133 L108,80 C112,78 116,78 118,82 Z" fill="#1C1C1C"/>
  <!-- Dark eyebrows -->
  <path d="M55,74 Q65,70 74,72" stroke="#1C1C1C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M86,72 Q95,70 105,74" stroke="#1C1C1C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lashes -->
  <path d="M57,79 L57,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M61,77 L60,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M65,76 L65,72" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M69,77 L70,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M73,79 L74,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M87,79 L87,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M91,77 L90,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M95,76 L95,72" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M99,77 L100,73" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M103,79 L104,75" stroke="#1C1C1C" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="65" cy="83" rx="8" ry="5" fill="white"/>
  <ellipse cx="95" cy="83" rx="8" ry="5" fill="white"/>
  <circle cx="65" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="95" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="66.5" cy="82.5" r="1.5" fill="white"/>
  <circle cx="96.5" cy="82.5" r="1.5" fill="white"/>
  <!-- Blush -->
  <ellipse cx="52" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="108" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.4"/>
  <!-- Nose -->
  <path d="M77,96 Q80,101 83,96" stroke="#D4A080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M69,108 Q80,117 91,108" stroke="#C07878" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M73,108 Q80,112 87,108" fill="#E8A0A0" opacity="0.4" stroke="none"/>
</svg>
