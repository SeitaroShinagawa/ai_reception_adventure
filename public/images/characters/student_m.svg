<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220">
  <!-- Green polo shirt body -->
  <path d="M0,220 L0,156 C30,145 60,138 70,130 L90,130 C100,138 130,145 160,156 L160,220 Z" fill="#2E7D45"/>
  <!-- Polo collar (folded collar shape) -->
  <path d="M67,130 L67,144 L73,140 L73,130 Z" fill="#256638"/>
  <path d="M93,130 L93,144 L87,140 L87,130 Z" fill="#256638"/>
  <!-- Polo placket (small opening at center) -->
  <rect x="77" y="130" width="6" height="14" rx="1" fill="#256638"/>
  <!-- Polo buttons -->
  <circle cx="80" cy="134" r="1.8" fill="#1E5230"/>
  <circle cx="80" cy="139" r="1.8" fill="#1E5230"/>
  <circle cx="80" cy="144" r="1.8" fill="#1E5230"/>
  <!-- Neck -->
  <rect x="71" y="126" width="18" height="17" rx="3" fill="#FFCBA4"/>
  <!-- Head -->
  <ellipse cx="80" cy="85" rx="38" ry="44" fill="#FFCBA4"/>
  <!-- Ears -->
  <ellipse cx="42" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <ellipse cx="118" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <!-- Brown hair, casual, slightly messy -->
  <path d="M44,80 C44,48 52,38 80,37 C108,38 116,48 116,80 C110,56 50,56 44,80 Z" fill="#7B4B2A"/>
  <ellipse cx="44" cy="83" rx="7" ry="9" fill="#7B4B2A"/>
  <ellipse cx="116" cy="83" rx="7" ry="9" fill="#7B4B2A"/>
  <!-- Slightly messy top strands -->
  <path d="M68,37 C66,30 72,26 78,30" stroke="#7B4B2A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M80,37 C80,28 86,24 90,29" stroke="#7B4B2A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows (brown) -->
  <path d="M55,74 Q65,70 74,72" stroke="#5A3520" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <path d="M86,72 Q95,70 105,74" stroke="#5A3520" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="65" cy="83" rx="8" ry="5" fill="white"/>
  <ellipse cx="95" cy="83" rx="8" ry="5" fill="white"/>
  <circle cx="65" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="95" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="66.5" cy="82.5" r="1.5" fill="white"/>
  <circle cx="96.5" cy="82.5" r="1.5" fill="white"/>
  <!-- Nose -->
  <path d="M77,96 Q80,101 83,96" stroke="#D4A080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Friendly open smile -->
  <path d="M68,108 Q80,118 92,108" stroke="#B06060" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
