<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220">
  <!-- Suit jacket body -->
  <path d="M0,220 L0,156 C30,145 60,138 70,130 L90,130 C100,138 130,145 160,156 L160,220 Z" fill="#2C3E50"/>
  <!-- Jacket lapels -->
  <path d="M70,130 L60,170 L80,158 Z" fill="#1A2B3C"/>
  <path d="M90,130 L100,170 L80,158 Z" fill="#1A2B3C"/>
  <!-- Blouse visible at center (ivory) -->
  <path d="M70,130 L80,158 L90,130 Q84,137 80,137 Q76,137 70,130 Z" fill="#FAF0E6"/>
  <!-- Brooch -->
  <circle cx="80" cy="148" r="4" fill="#C0A040"/>
  <circle cx="80" cy="148" r="2" fill="#F0D060"/>
  <!-- Neck -->
  <rect x="71" y="126" width="18" height="17" rx="3" fill="#FFCBA4"/>
  <!-- Head -->
  <ellipse cx="80" cy="85" rx="38" ry="44" fill="#FFCBA4"/>
  <!-- Ears -->
  <ellipse cx="42" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <ellipse cx="118" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <!-- Earrings -->
  <circle cx="38" cy="90" r="3" fill="#C0A040"/>
  <circle cx="122" cy="90" r="3" fill="#C0A040"/>
  <!-- White hair, chin-length bob -->
  <path d="M46,78 C46,50 54,39 80,38 C106,39 114,50 114,78 C108,58 52,58 46,78 Z" fill="#D8D8D8"/>
  <!-- Bob sides going to chin level -->
  <path d="M44,80 C40,90 38,104 40,114 C42,120 47,122 52,120 L52,78 Z" fill="#D8D8D8"/>
  <path d="M116,80 C120,90 122,104 120,114 C118,120 113,122 108,120 L108,78 Z" fill="#D8D8D8"/>
  <!-- Gray eyebrows -->
  <path d="M56,74 Q65,70 73,72" stroke="#999" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M87,72 Q95,70 104,74" stroke="#999" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Lashes (upper) -->
  <path d="M57,79 L57,75" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M61,77 L60,73" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M65,76 L65,72" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M69,77 L70,73" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M73,79 L74,75" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M87,79 L87,75" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M91,77 L90,73" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M95,76 L95,72" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M99,77 L100,73" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M103,79 L104,75" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="65" cy="83" rx="8" ry="5" fill="white"/>
  <ellipse cx="95" cy="83" rx="8" ry="5" fill="white"/>
  <circle cx="65" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="95" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="66.5" cy="82.5" r="1.5" fill="white"/>
  <circle cx="96.5" cy="82.5" r="1.5" fill="white"/>
  <!-- Glasses (oval) -->
  <ellipse cx="65" cy="84" rx="13" ry="8" fill="none" stroke="#666" stroke-width="2"/>
  <ellipse cx="95" cy="84" rx="13" ry="8" fill="none" stroke="#666" stroke-width="2"/>
  <line x1="78" y1="84" x2="82" y2="84" stroke="#666" stroke-width="2"/>
  <line x1="40" y1="84" x2="52" y2="84" stroke="#666" stroke-width="1.5"/>
  <line x1="108" y1="84" x2="120" y2="84" stroke="#666" stroke-width="1.5"/>
  <!-- Blush -->
  <ellipse cx="52" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.35"/>
  <ellipse cx="108" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.35"/>
  <!-- Nose -->
  <path d="M77,96 Q80,101 83,96" stroke="#D4A080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth (softer) -->
  <path d="M71,107 Q80,114 89,107" stroke="#C07878" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M74,107 Q80,110 86,107" fill="#E8A0A0" opacity="0.5" stroke="none"/>
</svg>
