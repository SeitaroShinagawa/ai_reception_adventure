<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220">
  <!-- Purple polo shirt body -->
  <path d="M0,220 L0,156 C30,145 60,138 70,130 L90,130 C100,138 130,145 160,156 L160,220 Z" fill="#6A5298"/>
  <!-- Polo collar -->
  <path d="M67,130 L67,144 L73,140 L73,130 Z" fill="#563D82"/>
  <path d="M93,130 L93,144 L87,140 L87,130 Z" fill="#563D82"/>
