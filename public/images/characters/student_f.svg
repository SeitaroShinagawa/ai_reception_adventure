  <rect x="77" y="130" width="6" height="14" rx="1" fill="#563D82"/>
  <!-- Polo buttons -->
  <circle cx="80" cy="134" r="1.8" fill="#42307A"/>
  <circle cx="80" cy="139" r="1.8" fill="#42307A"/>
  <circle cx="80" cy="144" r="1.8" fill="#42307A"/>
  <!-- Neck -->
  <rect x="71" y="126" width="18" height="17" rx="3" fill="#FFCBA4"/>
  <!-- Head -->
  <ellipse cx="80" cy="85" rx="38" ry="44" fill="#FFCBA4"/>
  <!-- Ears -->
  <ellipse cx="42" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <ellipse cx="118" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <!-- Small earrings -->
  <circle cx="38" cy="90" r="2.5" fill="#E0C0A0"/>
  <circle cx="122" cy="90" r="2.5" fill="#E0C0A0"/>
  <!-- Brown hair, ponytail -->
  <!-- Main hair top -->
  <path d="M44,80 C44,48 52,38 80,37 C108,38 116,48 116,80 C110,56 50,56 44,80 Z" fill="#7B4B2A"/>
  <ellipse cx="44" cy="83" rx="7" ry="9" fill="#7B4B2A"/>
  <ellipse cx="116" cy="83" rx="7" ry="9" fill="#7B4B2A"/>
  <!-- Hair tie/bun area at back -->
  <ellipse cx="115" cy="68" rx="9" ry="8" fill="#5A3520"/>
  <!-- Ponytail going to the side-back -->
  <path d="M118,64 C130,58 138,66 134,80 C130,90 125,94 120,90" stroke="#7B4B2A" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Hair tie band -->
  <ellipse cx="116" cy="68" rx="5" ry="4" fill="#C07050" stroke="#A05030" stroke-width="1"/>
  <!-- Eyebrows (brown) -->
  <path d="M55,74 Q65,70 74,72" stroke="#5A3520" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <path d="M86,72 Q95,70 105,74" stroke="#5A3520" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- Lashes -->
  <path d="M57,79 L57,75" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M61,77 L60,73" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M65,76 L65,72" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M69,77 L70,73" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M73,79 L74,75" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M87,79 L87,75" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M91,77 L90,73" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M95,76 L95,72" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M99,77 L100,73" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M103,79 L104,75" stroke="#3C2010" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="65" cy="83" rx="8" ry="5" fill="white"/>
  <ellipse cx="95" cy="83" rx="8" ry="5" fill="white"/>
  <circle cx="65" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="95" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="66.5" cy="82.5" r="1.5" fill="white"/>
  <circle cx="96.5" cy="82.5" r="1.5" fill="white"/>
  <!-- Blush -->
  <ellipse cx="52" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.38"/>
  <ellipse cx="108" cy="96" rx="10" ry="6" fill="#FFB6C1" opacity="0.38"/>
  <!-- Nose -->
  <path d="M77,96 Q80,101 83,96" stroke="#D4A080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M68,108 Q80,117 92,108" stroke="#C07878" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M72,108 Q80,112 88,108" fill="#E8A0A0" opacity="0.4" stroke="none"/>
