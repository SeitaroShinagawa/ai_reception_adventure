<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 220">
  <!-- Business casual shirt body -->
  <path d="M0,220 L0,156 C30,145 60,138 70,130 L90,130 C100,138 130,145 160,156 L160,220 Z" fill="#4A7EA5"/>
  <!-- Open collar / neckline -->
  <path d="M70,130 L74,148 L80,152 L86,148 L90,130 Q84,137 80,137 Q76,137 70,130 Z" fill="#3A6A8F"/>
  <path d="M74,130 L74,148 L80,152 L80,130 Z" fill="#3D6E95"/>
  <path d="M86,130 L86,148 L80,152 L80,130 Z" fill="#3D6E95"/>
  <!-- Neck -->
  <rect x="71" y="126" width="18" height="17" rx="3" fill="#FFCBA4"/>
  <!-- Head -->
  <ellipse cx="80" cy="85" rx="38" ry="44" fill="#FFCBA4"/>
  <!-- Ears -->
  <ellipse cx="42" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <ellipse cx="118" cy="88" rx="6" ry="8" fill="#FFCBA4"/>
  <!-- Black hair, neat, slight volume on top -->
  <path d="M44,80 C44,48 52,38 80,37 C108,38 116,48 116,80 C110,56 50,56 44,80 Z" fill="#1C1C1C"/>
  <ellipse cx="44" cy="83" rx="7" ry="9" fill="#1C1C1C"/>
  <ellipse cx="116" cy="83" rx="7" ry="9" fill="#1C1C1C"/>
  <!-- Dark eyebrows -->
  <path d="M55,74 Q65,70 74,72" stroke="#1C1C1C" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M86,72 Q95,70 105,74" stroke="#1C1C1C" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="65" cy="83" rx="8" ry="5" fill="white"/>
  <ellipse cx="95" cy="83" rx="8" ry="5" fill="white"/>
  <circle cx="65" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="95" cy="84" r="4" fill="#2C2C2C"/>
  <circle cx="66.5" cy="82.5" r="1.5" fill="white"/>
  <circle cx="96.5" cy="82.5" r="1.5" fill="white"/>
  <!-- Nose -->
  <path d="M77,96 Q80,101 83,96" stroke="#D4A080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Friendly smile -->
  <path d="M69,108 Q80,117 91,108" stroke="#B06060" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
