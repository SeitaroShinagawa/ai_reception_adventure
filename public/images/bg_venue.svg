<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Sky/ceiling gradient -->
  <defs>
    <linearGradient id="ceilingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1040"/>
      <stop offset="100%" stop-color="#2C1E60"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2A18"/>
      <stop offset="100%" stop-color="#1E1408"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0A0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFC040" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="chandelier1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFBE0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="chandelier2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFBE0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ceiling -->
  <rect x="0" y="0" width="800" height="200" fill="url(#ceilingGrad)"/>

  <!-- Floor -->
  <rect x="0" y="340" width="800" height="160" fill="url(#floorGrad)"/>

  <!-- Wall (warm dark tone) -->
  <rect x="0" y="200" width="800" height="140" fill="#2A1E0E"/>

  <!-- Decorative wall panels -->
  <rect x="20" y="210" width="110" height="120" rx="4" fill="none" stroke="#4A3820" stroke-width="2"/>
  <rect x="150" y="210" width="110" height="120" rx="4" fill="none" stroke="#4A3820" stroke-width="2"/>
  <rect x="280" y="210" width="110" height="120" rx="4" fill="none" stroke="#4A3820" stroke-width="2"/>
  <rect x="410" y="210" width="110" height="120" rx="4" fill="none" stroke="#4A3820" stroke-width="2"/>
  <rect x="540" y="210" width="110" height="120" rx="4" fill="none" stroke="#4A3820" stroke-width="2"/>
  <rect x="670" y="210" width="110" height="120" rx="4" fill="none" stroke="#4A3820" stroke-width="2"/>

  <!-- Windows with warm light glow -->
  <rect x="150" y="215" width="110" height="110" rx="3" fill="url(#windowGlow)"/>
  <rect x="410" y="215" width="110" height="110" rx="3" fill="url(#windowGlow)"/>
  <rect x="670" y="215" width="110" height="110" rx="3" fill="url(#windowGlow)"/>
  <!-- Window frames -->
  <line x1="205" y1="215" x2="205" y2="325" stroke="#6A5030" stroke-width="1.5"/>
  <line x1="150" y1="270" x2="260" y2="270" stroke="#6A5030" stroke-width="1.5"/>
  <line x1="465" y1="215" x2="465" y2="325" stroke="#6A5030" stroke-width="1.5"/>
  <line x1="410" y1="270" x2="520" y2="270" stroke="#6A5030" stroke-width="1.5"/>
  <line x1="725" y1="215" x2="725" y2="325" stroke="#6A5030" stroke-width="1.5"/>
  <line x1="670" y1="270" x2="780" y2="270" stroke="#6A5030" stroke-width="1.5"/>

  <!-- Chandelier light glow -->
  <ellipse cx="200" cy="30" rx="120" ry="80" fill="url(#chandelier1)"/>
  <ellipse cx="600" cy="30" rx="100" ry="70" fill="url(#chandelier2)"/>

  <!-- Chandelier body (left) -->
  <ellipse cx="200" cy="10" rx="30" ry="8" fill="#C8A830"/>
  <line x1="200" y1="10" x2="200" y2="40" stroke="#A08828" stroke-width="3"/>
  <ellipse cx="200" cy="42" rx="18" ry="6" fill="#D4B840"/>
  <!-- Chandelier lights -->
  <circle cx="182" cy="46" r="4" fill="#FFFBE0"/>
  <circle cx="200" cy="48" r="4" fill="#FFFBE0"/>
  <circle cx="218" cy="46" r="4" fill="#FFFBE0"/>
  <circle cx="188" cy="52" r="3" fill="#FFFBE0"/>
  <circle cx="212" cy="52" r="3" fill="#FFFBE0"/>

  <!-- Chandelier body (right) -->
  <ellipse cx="600" cy="10" rx="28" ry="7" fill="#C8A830"/>
  <line x1="600" y1="10" x2="600" y2="38" stroke="#A08828" stroke-width="3"/>
  <ellipse cx="600" cy="40" rx="16" ry="5" fill="#D4B840"/>
  <circle cx="584" cy="44" r="4" fill="#FFFBE0"/>
  <circle cx="600" cy="46" r="4" fill="#FFFBE0"/>
  <circle cx="616" cy="44" r="4" fill="#FFFBE0"/>
  <circle cx="590" cy="50" r="3" fill="#FFFBE0"/>
  <circle cx="610" cy="50" r="3" fill="#FFFBE0"/>

  <!-- Floor reflection (wood parquet) -->
  <rect x="0" y="340" width="800" height="2" fill="#6A4E28" opacity="0.4"/>
  <!-- Parquet lines -->
  <line x1="0" y1="360" x2="800" y2="360" stroke="#2A1C0C" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="380" x2="800" y2="380" stroke="#2A1C0C" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#2A1C0C" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#2A1C0C" stroke-width="0.8" opacity="0.5"/>
  <line x1="80" y1="340" x2="80" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="160" y1="340" x2="160" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="240" y1="340" x2="240" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="320" y1="340" x2="320" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="340" x2="400" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="480" y1="340" x2="480" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="560" y1="340" x2="560" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="640" y1="340" x2="640" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>
  <line x1="720" y1="340" x2="720" y2="500" stroke="#2A1C0C" stroke-width="0.8" opacity="0.3"/>

  <!-- Background people silhouettes (far) -->
  <!-- Person 1 -->
  <ellipse cx="320" cy="286" rx="14" ry="16" fill="#1A1010" opacity="0.5"/>
  <rect x="310" y="300" width="20" height="40" rx="5" fill="#1A1010" opacity="0.5"/>
  <!-- Person 2 -->
  <ellipse cx="360" cy="290" rx="12" ry="14" fill="#1A1010" opacity="0.45"/>
  <rect x="351" y="302" width="18" height="38" rx="5" fill="#1A1010" opacity="0.45"/>
  <!-- Person 3 -->
  <ellipse cx="450" cy="284" rx="14" ry="16" fill="#1A1010" opacity="0.5"/>
  <rect x="440" y="298" width="20" height="42" rx="5" fill="#1A1010" opacity="0.5"/>
  <!-- Person 4 -->
  <ellipse cx="490" cy="288" rx="12" ry="14" fill="#1A1010" opacity="0.4"/>
  <rect x="481" y="300" width="18" height="40" rx="5" fill="#1A1010" opacity="0.4"/>

  <!-- Round cocktail tables in background -->
  <!-- Table 1 -->
  <ellipse cx="100" cy="330" rx="35" ry="10" fill="#5A3E20"/>
  <rect x="96" y="330" width="8" height="20" fill="#4A3018"/>
  <!-- Table 2 -->
  <ellipse cx="700" cy="328" rx="35" ry="10" fill="#5A3E20"/>
  <rect x="696" y="328" width="8" height="20" fill="#4A3018"/>
  <!-- Table 3 -->
  <ellipse cx="400" cy="332" rx="35" ry="10" fill="#5A3E20"/>
  <rect x="396" y="332" width="8" height="20" fill="#4A3018"/>

  <!-- Ambient light on floor from windows -->
  <ellipse cx="205" cy="380" rx="60" ry="20" fill="#FFE0A0" opacity="0.08"/>
  <ellipse cx="465" cy="380" rx="60" ry="20" fill="#FFE0A0" opacity="0.08"/>
  <ellipse cx="725" cy="380" rx="60" ry="20" fill="#FFE0A0" opacity="0.08"/>
</svg>
